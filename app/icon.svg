<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f2d20"/>
      <stop offset="100%" stop-color="#071a0f"/>
    </linearGradient>
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <radialGradient id="shine" cx="28%" cy="28%" r="55%">
      <stop offset="0%" stop-color="#1e4032" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="drop" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="-1.5" dy="-1.5" stdDeviation="1" flood-color="#1e4032" flood-opacity="0.9"/>
      <feDropShadow dx="1.5" dy="1.5" stdDeviation="1" flood-color="#000000" flood-opacity="0.8"/>
    </filter>
    <filter id="emboss" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="-0.8" dy="-0.8" stdDeviation="0.4" flood-color="#34d399" flood-opacity="0.55"/>
      <feDropShadow dx="0.8" dy="0.8" stdDeviation="0.4" flood-color="#000000" flood-opacity="0.9"/>
    </filter>
  </defs>

  <!-- Base neumórfica -->
  <rect width="32" height="32" rx="7" fill="url(#bg)" filter="url(#drop)"/>

  <!-- Camada de brilho neuro (canto superior esquerdo = luz) -->
  <rect width="32" height="32" rx="7" fill="url(#shine)" opacity="0.7"/>

  <!-- Borda top: clarinha (simula a luz batendo) -->
  <rect x="1" y="1" width="30" height="1" rx="0.5" fill="#2d6b48" opacity="0.5"/>
  <rect x="1" y="1" width="1" height="30" rx="0.5" fill="#2d6b48" opacity="0.3"/>

  <!-- Linha de acento verde na base (profundidade) -->
  <rect x="7" y="27.5" width="18" height="1.8" rx="0.9" fill="url(#acc)" opacity="0.75"/>

  <!-- Letras FC em relevo neumórfico -->
  <text
    x="16"
    y="21.5"
    text-anchor="middle"
    fill="url(#acc)"
    font-family="'Arial Black', 'Arial Bold', Arial, sans-serif"
    font-size="13.5"
    font-weight="900"
    letter-spacing="-0.5"
    filter="url(#emboss)"
  >FC</text>
</svg>
